<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Avançado de Comunicação - Indústria</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Mural de Comunicação Interna</h1>
            <button id="btn-contraste" aria-label="Alternar alto contraste">Ativar Alto Contraste</button>
        </div>
    </header>

    <main>
        <section class="boas-vindas">
            <h2>Portal do Colaborador</h2>
            <p>Utilize este sistema para compartilhar informações importantes, alertas de segurança e ideias sustentáveis com toda a equipe.</p>
        </section>

        <div class="grid-container">
            <section class="painel-form">
                <h2>Nova Publicação</h2>
                <form id="form-comunicado">
                    <label for="nome">Nome do Colaborador:</label>
                    <input type="text" id="nome" required placeholder="Ex: Maria Silva">

                    <label for="categoria">Categoria do Aviso:</label>
                    <select id="categoria" required>
                        <option value="aviso">Aviso Geral</option>
                        <option value="ideia">Ideia Sustentável</option>
                        <option value="alerta">Alerta de Segurança</option>
                    </select>

                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" rows="4" required placeholder="Digite os detalhes da sua publicação..."></textarea>

                    <button type="submit">Publicar no Mural</button>
                </form>
            </section>
            
            <section class="painel-mural">
                <div class="mural-header">
                    <h2>Mural em Tempo Real</h2>
                    <span id="contador-mensagens">0 publicações</span>
                </div>
                <div id="mensagens-publicadas">
                    </div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
